name: CI/CD Pipeline for .NET MAUI App

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  build:
    name: Build and Test (${{ matrix.target }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: android
            framework: net8.0-android
          - target: windows
            framework: net8.0-windows10.0.19041.0

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore .NET workloads
        run: dotnet workload restore EnviroPulse/EnviroPulse.sln

      - name: Restore NuGet packages
        run: dotnet restore EnviroPulse/EnviroPulse.sln

      - name: Build app
        run: dotnet build EnviroPulse/EnviroPulse.csproj --configuration Release --framework ${{ matrix.framework }} --no-restore

      - name: Run tests
        run: dotnet test Tests/Tests.csproj --configuration Release --framework net8.0 --no-restore --verbosity normal
